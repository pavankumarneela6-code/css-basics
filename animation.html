<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width:600px;
            height:600px;
            border:1px solid black;
            margin:auto;
            margin-top:100px;
            position:relative;
            top:0px;
            left:0px;
            

        }
        .box1{
            width:100px;
            height:100px;
            background-color:red;
            position:absolute;
            animation:move 5s infinite;
            animation-delay:10s;
            

        }
        @keyframes move{
            0%{
                left:0px;
                top:0px;
                background-color: red;
            }
            25%{
                left:500px;
                top:0px;
                background-color: green;

            }
            50%{
                left:500px;
                top:500px;
                background-color: blue;
            }
            75%{
                left:0px;
                top:500px;
                background-color: aqua;
            }
            100%{
                left:0px;
                top:0px;
                background-color: red;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1"></div>
    </div>
    
</body>
</html>
