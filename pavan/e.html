<html>
<head>
<title>flex</title>

<style>

body{
    background:linear-gradient(blue,red,#764ba2);
}

.main{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:50px;
}

.left{
    color:white;
    font-size:40px;
    font-family:cursive;
}

.right{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.child{
    display:flex;
    gap:20px;
}

.a{
    color:white;
    background-color:red;
    padding:10px;
}

.b{
    color:blue;
    background-color:aqua;
    padding:10px;
}

.c{
    color:green;
    background-color:yellow;
    padding:10px;
}

img{
    border-radius:20px;
}

</style>
</head>

<body>

<div class="main">

    <div class="left">
        Hi I'm Pavan
    </div>

    <div class="right">

        <div class="child">
            <a class="a" href="about.html">about</a>
            <a class="b" href="contact.html">contact</a>
            <a class="c" href="address.html">address</a>
        </div>

        <div>
            <img src="pavan.jpeg" width="300" height="200">
        </div>

    </div>

</div>

</body>
</html>
