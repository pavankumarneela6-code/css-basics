<html>
    <head>
        <title>flex</title>
    </head>
    <style>
        body{
    margin: 0;
    padding: 20px;
    background: linear-gradient(blue,red,#764ba2);
}


    .parent{
        display: flex;
        justify-self:space-between;
        text-align: center;
        gap: 150px;
        width: 100px;
        
    }
    .child{
        display: flex;
        gap: 30px;
    }
    .a{
        color: white;
        background-color: red;
        padding: 5px 10px;
        text-decoration: none;
    }
    .b{
        color: blue;
        background-color: aqua;
         padding: 5px 10px;
        text-decoration: none;
    }
    .c{
        color: green;
        background-color: yellow;
        padding: 5px 10px;
        text-decoration: none;
    }
    img{
        display: block;
        border-radius: 20px;    
    }
   .text{
    display: flex;
    color: white;
    font-size: 30px;
    font-family: cursive;
    text-shadow: 2px 2px 4px #000000
    ;
    }
    </style>    
   <body style="background:linear-gradient(blue,red,#764ba2);">
    <div class="parent">

        <!-- left text -->
        <div class="text">
            <span>Hi </span>&nbsp;
            <span>I'm</span>&nbsp;&nbsp;
            <span style="color:yellow;"> PAVAN</span>
        </div>

        <!-- right side -->
        <div class="right">
            <div class="child">
                <a class="a" href="about.html">about</a>
                <a class="b" href="contact.html">contact</a>
                <a class="c" href="address.html">address</a>
            </div>

            <div>
                <img src="pavan.jpeg" width="300" height="200" alt="Image">
            </div>

        </div>

    </div>

</body>
</html>
