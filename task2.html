<html>
    <head>
        <title>event</title>
    </head>
    <style>
        .card{
            width: 300px;
            margin: 20px;
            background-color: #aba7a7;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(9, 9, 9, 0.2);
            overflow: hidden;
            float: left;
        }
        .card img{
            width: 100%;
            height: 200px;
            object-fit:cover;
            border: 1px solid #ddd;
        }
        .content{
            padding: 15px;
        }
        .content h3{
            margin: 0px;
           
        }
        .content p{
            color: #0a0a0b;
        }
    </style>
    <body>
        <h1>Event</h1>
        <div class="card">
            <img src="coding.jpeg" alt="Coding Contest" width="200">
            <div class="content">
                  <h3>Coding Contest</h3>
                 <p>Programming Challenge</p>
                 <button style="background-color: aquamarine;">Register</button>
            </div>
        </div>    
        <div class="card">
            <img src="hackthon.jpeg" alt="Coding Contest" width="200">
            <div class="content">
                  <h3>Hackthon</h3>
                 <p>Build projects.</p>
                 <button style="background-color: aquamarine;">Register</button>
            </div>
        </div>
        <div class="card">
            <img src="quiz.jpeg" alt="Coding Contest" width="200">
            <div class="content">
                  <h3>Quiz</h3>
                 <p>Technical quiz.</p>
                 <button style="background-color: aquamarine;">Register</button>
            </div>
        </div>        
        <div class="card">
            <img src="poster.jpeg" alt="Coding Contest" width="200">
            <div class="content">
                  <h3>Poster</h3>
                 <p>Poster presentation</p>
                 <button style="background-color: aquamarine;">Register</button>
            </div>
        </div> 
        <div class="card">
            <img src="talk.jpeg" alt="Coding Contest" width="200">
            <div class="content">
                  <h3>Talk</h3>
                 <p>Expert session.</p>
                 <button style="background-color: aquamarine;">Register</button>
            </div>
        </div> 
        <div class="card">
            <img src="project.jpeg" alt="Coding Contest" width="200">
            <div class="content">
                  <h3>Project Expo</h3>
                 <p>Showcase Projects.</p>
                 <button style="background-color: aquamarine;">Register</button>
            </div>
        </div>          
        <h1></h1>
    </body>
</html>
