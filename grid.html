<html>
<head>
    <title>grid</title>
</head>
<style>
    .parent{
        display: grid;
        width: 322px;
        height: 322px;
        background-color: rgb(17, 11, 21);
        grid-template-columns:  repeat(3, 100px);
        grid-template-rows: 100px 100px 100px;
        justify-items:stretch;
        grid-gap: 10px;
        
    }
    .child1{
        background-color: red;
        grid-column: 1/4;
        grid-row: 1/2;
       
    }
    .child2{
        background-color: blue;
        grid-row: 2/3;
        grid-column: 1/2;

           
    }
    .child3{
        background-color: green;
        grid-column: 2/3;
        grid-row: 2/3;
    }
    .child4{
        background-color: yellow;
        grid-column: 3/4;
        grid-row: 2/3;
    }
    .child5{
        background-color: pink;
        grid-column: 1/4;
        grid-row: 3/4;
    }       

    
</style>
<body>
    <div class="parent">
        <div class="child1 ">1</div>
        <div class="child2">2</div>
        <div class="child3">3</div>
        <div class="child4">4</div>
        <div class="child5">5</div>
        
        
    </div>
</body>
</html>
